<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Розклад — Nearbus</title>
  <link rel="stylesheet" href="tokens.css?v=1"/>
  <link rel="stylesheet" href="glass.css?v=1"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100dvh;padding-bottom:max(env(safe-area-inset-bottom,0px) + 80px,88px)}

    /* ── HEADER ── */
    .header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:none;padding:calc(env(safe-area-inset-top, 47px) + 12px) 16px 12px;}
    .header__top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .back-btn{display:flex;align-items:center;gap:4px;color:var(--text);font-size:15px;font-weight:600;text-decoration:none;padding:6px 14px 6px 10px;background:var(--surface-elevated);border:none;cursor:pointer;border-radius:99px;box-shadow:inset 0 0 0 .5px rgba(255,255,255,0.1),inset 0 1px 0 rgba(255,255,255,0.2);backdrop-filter:blur(20px);transition:transform .2s, opacity .2s;flex-shrink:0}
    .back-btn:active{transform:scale(0.95);opacity:0.8}
    .header__title{font-size:17px;font-weight:700;letter-spacing:-.4px;flex:1;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,0.1)}
    .header__time{font-size:13px;font-weight:600;color:var(--text);background:var(--surface-elevated);padding:6px 12px;border-radius:99px;box-shadow:inset 0 0 0 .5px rgba(255,255,255,0.1),inset 0 1px 0 rgba(255,255,255,0.2);backdrop-filter:blur(20px);min-width:44px;text-align:center}

    /* Segment */
    .segment-wrap{padding:0 16px 10px}
    .segment{display:flex;background:var(--segment-track);border-radius:99px;padding:3px;position:relative;box-shadow:inset 0 0 0 1px var(--separator);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .segment__slider{position:absolute;top:3px;bottom:3px;left:3px;width:calc(50% - 3px);background:var(--segment-slider);border-radius:99px;box-shadow:0 0 0 1px var(--separator);transition:transform .32s cubic-bezier(.32,.72,0,1);pointer-events:none}
    .segment__slider--right{transform:translateX(100%)}
    .segment__btn{flex:1;padding:7px 0;border-radius:99px;border:none;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:5px;transition:color .2s}
    .segment__btn--active{color:var(--text)}

    /* ── TOOLBAR (search + direction) ── */
    .toolbar{display:flex;align-items:center;gap:8px;padding:0 16px 12px}
    .search-wrap{flex:1;position:relative;display:flex;align-items:center}
    .search-wrap svg.search-icon{position:absolute;left:10px;color:var(--text-tertiary);pointer-events:none;flex-shrink:0}
    .search-input{width:100%;padding:9px 32px 9px 34px;font-size:15px;border-radius:99px;border:none;box-shadow:inset 0 0 0 .5px var(--separator),inset 0 2px 4px rgba(0,0,0,.05);background:var(--surface);color:var(--text);outline:none;transition:all .2s;-webkit-appearance:none;appearance:none}
    .search-input:focus{box-shadow:inset 0 0 0 1.5px var(--accent),inset 0 2px 4px rgba(0,122,255,.1)}
    .search-input::placeholder{color:var(--text-tertiary)}
    .search-clear{position:absolute;right:8px;width:20px;height:20px;border:none;background:var(--text-tertiary);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
    .search-clear--visible{opacity:1;pointer-events:auto}

    .dir-btn{width:42px;height:42px;border-radius:99px;border:none;background:var(--surface-elevated);box-shadow:inset 0 0 0 .5px rgba(255,255,255,0.1),inset 0 1px 0 rgba(255,255,255,0.2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.32,.72,0,1);position:relative}
    .dir-btn:active{transform:scale(.92);opacity:.8}
    .dir-btn--active{background:linear-gradient(180deg, var(--accent-light) 0%, rgba(0,122,255,0.05) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 0 0 .5px rgba(0,122,255,.3);color:var(--accent)}
    .dir-badge{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}

    /* ── HERO ── */
    .hero{padding:0 16px 0;display:flex;gap:16px;align-items:stretch}
    .hero__main{flex:1;background:linear-gradient(135deg,var(--accent-light) 0%,rgba(0,122,255,.05) 100%);border:none;box-shadow:inset 0 0 0 .5px rgba(0,122,255,.2),0 4px 12px rgba(0,122,255,.08);border-radius:20px;padding:12px 16px;position:relative;overflow:hidden;cursor:default}
    .hero__main::after{content:'';position:absolute;top:-24px;right:-24px;width:90px;height:90px;background:radial-gradient(circle,rgba(0,122,255,.12) 0%,transparent 70%);pointer-events:none}
    .hero__stop-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:5px}
    .hero__pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pdot 1.8s ease-in-out infinite}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
    .hero__stop-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hero__minutes{display:flex;align-items:baseline;font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1;margin-bottom:2px}
    .hero__minutes em{font-size:26px;font-weight:600;font-style:normal;color:var(--text-secondary);margin-left:4px;margin-right:8px;letter-spacing:0}
    .hero__departure{font-size:12px;color:var(--text-secondary);margin-top:5px}
    .hero__side{display:flex;flex-direction:column;gap:12px}

    .hero__day-btn{background:var(--surface-elevated);backdrop-filter:blur(30px) saturate(200%);-webkit-backdrop-filter:blur(30px) saturate(200%);border:none;box-shadow:0 0 0 .5px var(--separator),inset 0 1px 0 rgba(255,255,255,.25);border-radius:24px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:64px;flex:1;transition:all .2s cubic-bezier(.32,.72,0,1)}
    .hero__day-btn:active{transform:scale(.94);opacity:.8}
    .hero__day-icon{color:var(--text-secondary)}
    .hero__day-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text-secondary);text-align:center;white-space:nowrap}

    .hero__direction-card{background:var(--surface-elevated);backdrop-filter:blur(30px) saturate(200%);-webkit-backdrop-filter:blur(30px) saturate(200%);border:none;box-shadow:0 0 0 .5px var(--separator),inset 0 1px 0 rgba(255,255,255,.25);border-radius:24px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:64px;cursor:pointer;transition:all .2s cubic-bezier(.32,.72,0,1)}
    .hero__direction-card:active{transform:scale(.94);opacity:.8}
    .hero__dir-from{font-size:9px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
    .hero__dir-arrow{color:var(--text-tertiary)}
    .hero__dir-to{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.3px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}

    /* ── STATS ── */
    .stats-bar{margin:10px 16px 0;display:flex;gap:7px}
    .stat-chip{flex:1;background:var(--surface-elevated);border:.5px solid var(--separator);border-radius:10px;padding:9px 10px;display:flex;align-items:center;gap:7px}
    .stat-chip__icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stat-chip__icon--blue{background:rgba(0,122,255,.12);color:var(--accent)}
    .stat-chip__icon--green{background:rgba(52,199,89,.12);color:#34c759}
    .stat-chip__icon--orange{background:rgba(255,149,0,.12);color:#ff9500}
    .stat-chip__label{font-size:10px;color:var(--text-secondary);font-weight:500;line-height:1.2}
    .stat-chip__value{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.2px;line-height:1.2}

    /* ── SECTION HEADER ── */
    .section-header{padding:18px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .section-header__title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-secondary)}
    .section-header__badge{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);border-radius:20px;padding:2px 9px}

    /* ── NO RESULTS ── */
    .no-results{text-align:center;padding:40px 16px;color:var(--text-tertiary)}
    .no-results__title{font-size:15px;font-weight:600;color:var(--text);margin-top:12px;margin-bottom:4px}
    .no-results__sub{font-size:13px}

    /* ── TIMELINE ── */
    .timeline{padding:0 16px;position:relative}
    .timeline::before{content:'';position:absolute;left:26px;top:10px;bottom:10px;width:1.5px;background:linear-gradient(to bottom,transparent,var(--separator-opaque) 8%,var(--separator-opaque) 92%,transparent)}

    .stop-row{display:flex;align-items:flex-start;gap:10px;padding:4px 0;cursor:pointer;animation:sin .28s cubic-bezier(.32,.72,0,1) both}
    @keyframes sin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .stop-row__dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--separator-opaque);background:var(--bg);flex-shrink:0;margin-top:14px;z-index:1;position:relative;display:flex;align-items:center;justify-content:center;transition:all .25s}
    .stop-row__dot-inner{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);transition:all .25s}
    .stop-row__body{flex:1;background:var(--surface-elevated);border:.5px solid var(--separator);border-radius:var(--radius-md);padding:10px 13px;transition:all .22s;user-select:none}
    .stop-row__top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
    .stop-row__name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0}
    .stop-row__actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .stop-row__next-badge{display:flex;align-items:center;gap:3px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:7px;padding:3px 8px}
    .stop-row__mystop-btn{width:28px;height:28px;border-radius:99px;border:none;box-shadow:inset 0 0 0 1.5px var(--separator);background:transparent;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.32,.72,0,1);flex-shrink:0}
    .stop-row__mystop-btn--active{background:linear-gradient(180deg, rgba(255,149,0,.1) 0%, rgba(255,149,0,.2) 100%);box-shadow:inset 0 0 0 1.5px rgba(255,149,0,.5),0 2px 6px rgba(255,149,0,.2);color:#ff9500;transform:scale(1.05)}
    .times-grid{display:flex;flex-wrap:wrap;gap:4px}
    .time-chip{display:inline-block;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text-secondary);background:var(--bg);border:1px solid var(--separator-opaque);border-radius:6px;transition:all .2s;white-space:nowrap}
    .time-chip--next{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
    .time-chip--past{opacity: 0.4;}

    /* stop states */
    .stop-row--mystop .stop-row__dot{border-color:#ff9500;background:#ff9500}
    .stop-row--mystop .stop-row__dot-inner{background:#fff;transform:scale(0)}
    .stop-row--mystop .stop-row__body{background:rgba(255,149,0,.08);border-color:rgba(255,149,0,.28)}
    .stop-row--mystop .stop-row__name{color:#ff9500}

    .stop-row--next-stop .stop-row__dot{border-color:var(--accent);background:var(--accent)}
    .stop-row--next-stop .stop-row__dot-inner{background:#fff;transform:scale(0)}
    .stop-row--next-stop .stop-row__body{background:rgba(0,122,255,.07);border-color:rgba(0,122,255,.25);box-shadow:0 0 0 3px rgba(0,122,255,.05)}
    .stop-row--next-stop .stop-row__name{color:var(--accent)}

    .stop-row--past{opacity:.5}
    .stop-row--endpoint .stop-row__name{font-weight:700}

    /* ── DIRECTION BANNER ── */
    .dir-banner{margin:10px 16px 0;background:rgba(255,149,0,.1);border:.5px solid rgba(255,149,0,.25);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
    .dir-banner svg{color:#ff9500;flex-shrink:0}
    .dir-banner p{font-size:12px;color:var(--text-secondary);line-height:1.4}

    /* ── CTA ── */
    .cta-wrap{padding:16px 16px 0}
    .map-cta{background:linear-gradient(180deg, #1c88ff 0%, #006ce0 100%);box-shadow:inset 0 1px 1px rgba(255,255,255,.3);color:#fff;border:none;border-radius:99px;padding:16px 20px;font-size:16px;font-weight:600;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:all .25s cubic-bezier(.32,.72,0,1);letter-spacing:-.2px}
    .map-cta:active{opacity:.9;transform:scale(.97);box-shadow:inset 0 1px 1px rgba(255,255,255,.3)}
  </style>
</head>

function updateClock(){
  var n=new Date();
  var el=document.getElementById('liveClock');
  if(el) el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

/* ─── CONTROLS ─── */
function switchRoute(r){
  ST.route=r;
  saveState();
  document.getElementById('tab1').className='segment__btn'+(r===1?' segment__btn--active':'');
  document.getElementById('tab1').setAttribute('aria-selected',r===1);
  document.getElementById('tab2').className='segment__btn'+(r===2?' segment__btn--active':'');
  document.getElementById('tab2').setAttribute('aria-selected',r===2);
  document.getElementById('segSlider').className='segment__slider glass-indicator'+(r===2?' segment__slider--right':'');
  render();
}

function toggleDirection(){
  ST.isReversed=!ST.isReversed;
  saveState();
  render();
}

function setMyStop(key,name){
  if(ST.myStopKey===key){ ST.myStopKey=null; } else { ST.myStopKey=key; }
  saveState();
  render();
}

function onSearch(val){
  ST.query=val.trim().toLowerCase();
  document.getElementById('searchClear').className='search-clear'+(ST.query?' search-clear--visible':'');
  render();
}

function clearSearch(){
  ST.query='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').className='search-clear';
  render();
}

/* ─── RENDER ─── */
function render(){
  var route=ROUTES[ST.route];
  var stops=route.stops.slice();
  if(ST.isReversed) stops=stops.slice().reverse();

  var now=nowMin();
  var mk='m'+ST.route;

  // Find hero stop: myStop if set, else first stop
  var heroObj = ST.myStopKey ? stops.find(function(s){return s.k===ST.myStopKey;}) : stops[0];
  if (!heroObj) { heroObj = stops[0]; ST.myStopKey = null; }
  var heroKey = heroObj.k;
  var heroName = heroObj.n;
  var heroTimes=getTimes(heroKey);
  var heroNi=findNext(heroTimes);
  var heroNt=heroNi>=0?heroTimes[heroNi]:null;
  var heroMl=heroNt?minUntil(heroNt):null;

  // Remaining trips from hero stop
  var remaining=heroNt?heroTimes.length-heroNi:0;

  // Update Day Toggle UI
  document.getElementById('daySlider').className = 'segment__slider glass-indicator' + (ST.isHoliday ? ' segment__slider--right' : '');
  document.getElementById('dayTab1').className = 'segment__btn' + (!ST.isHoliday ? ' segment__btn--active' : '');
  document.getElementById('dayTab1').setAttribute('aria-selected', !ST.isHoliday);
  document.getElementById('dayTab2').className = 'segment__btn' + (ST.isHoliday ? ' segment__btn--active' : '');
  document.getElementById('dayTab2').setAttribute('aria-selected', ST.isHoliday);

  var hHero='';

  /* HERO */
  var fromLabel=ST.isReversed?route.b:route.a;
  var toLabel=ST.isReversed?route.a:route.b;
  hHero+='<div class="hero">';
  hHero+='<div class="hero__main">';
  hHero+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
  hHero+='<div class="hero__stop-label" style="margin:0;"><span class="hero__pulse"></span>'+(ST.myStopKey?'МОЯ ЗУПИНКА':'ПОЧАТОК МАРШРУТУ')+'</div>';
  var dirBtnClass = ST.isReversed ? 'dir-btn dir-btn--active' : 'dir-btn';
  var dirBtnBadge = ST.isReversed ? '<div class="dir-badge"></div>' : '';
  hHero+='<button class="'+dirBtnClass+'" style="width:30px;height:30px;margin:0;box-shadow:none;background:var(--bg);" onclick="toggleDirection()" title="Змінити напрямок" aria-label="Змінити напрямок"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>'+dirBtnBadge+'</button>';
  hHero+='</div>';
  hHero+='<div class="hero__stop-name" style="font-size:22px;line-height:1.2;margin-bottom:2px;white-space:normal;">'+fromLabel+' <span style="color:var(--text-tertiary);">&rarr;</span> '+toLabel+'</div>';
  hHero+='<div class="hero__stop-name" style="font-size:14px;color:var(--text-secondary);font-weight:500;margin-bottom:12px;">Посадка: '+heroName+'</div>';
  if(heroMl!==null&&heroMl>=0){
    if(heroMl===0){ hHero+='<div class="hero__minutes">Зараз</div>'; }
    else if(heroMl>=60){
      var hM=Math.floor(heroMl/60);var mM=heroMl%60;
      hHero+='<div class="hero__minutes">'+hM+'<em>год</em> '+mM+'<em>хв</em></div>';
    }
    else { hHero+='<div class="hero__minutes">'+heroMl+'<em>хв</em></div>'; }
    hHero+='<div class="hero__departure">Відправлення о '+heroNt+'</div>';
  } else {
    hHero+='<div class="hero__minutes" style="font-size:20px;font-weight:700;color:var(--text-secondary);line-height:1.3">Рейсів<br>більше немає</div>';
    hHero+='<div class="hero__departure">Перший завтра о '+(heroTimes.length?heroTimes[0]:'—')+'</div>';
  }
  hHero+='</div></div>';

  /* STATS */
  hHero+='<div class="stats-bar">';
  hHero+='<div class="stat-chip"><div class="stat-chip__icon stat-chip__icon--green"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="stat-chip__label">Інтервал</div><div class="stat-chip__value">'+(ST.isHoliday?route.ih:route.iw)+'</div></div></div>';
  hHero+='<div class="stat-chip"><div class="stat-chip__icon stat-chip__icon--orange"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div><div class="stat-chip__label">Рейсів ще</div><div class="stat-chip__value">'+(remaining>0?remaining:'0')+'</div></div></div>';
  hHero+='</div>';

  /* DIRECTION BANNER (reverse mode) */
  if(ST.isReversed){
    hHero+='<div class="dir-banner">';
    hHero+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    hHero+='<p>Зворотній напрямок. Розклад показано у зворотньому порядку — це час прибуття на кожну зупинку при русі <b>від '+route.b+' до '+route.a+'</b>.</p>';
    hHero+='</div>';
  }
  document.getElementById('heroContent').innerHTML = hHero;

  var hTimeline='';

  /* SECTION HEADER BADGE */
  var filteredCount=0;
  var filteredStops=stops.filter(function(s){
    if(!ST.query) return true;
    return s.n.toLowerCase().indexOf(ST.query)!==-1;
  });
  filteredCount=filteredStops.length;

  var searchBadgeEl = document.getElementById('searchBadge');
  if(ST.query&&filteredCount>0) searchBadgeEl.innerHTML = '<div class="section-header__badge">'+filteredCount+' знайдено</div>';
  else if(ST.query&&filteredCount===0) searchBadgeEl.innerHTML = '<div class="section-header__badge" style="background:rgba(255,59,48,.12);color:var(--danger)">Не знайдено</div>';
  else searchBadgeEl.innerHTML = '';

  /* NO RESULTS */
  if(ST.query&&filteredCount===0){
    hTimeline+='<div class="no-results">';
    hTimeline+='<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
    hTimeline+='<div class="no-results__title">Зупинку не знайдено</div>';
    hTimeline+='<div class="no-results__sub">Перевірте написання або <button onclick="clearSearch()" style="background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;">очистіть пошук</button></div>';
    hTimeline+='</div>';
  }

  /* TIMELINE */
  hTimeline+='<div class="timeline">';
  filteredStops.forEach(function(stop, idx){
    var times=getTimes(stop.k);
    var si=findNext(times);
    var st=si>=0?times[si]:null;
    var isAllPast=times.length>0&&st===null;
    var isMyStop=ST.myStopKey===stop.k;
    var isNextStop=!ST.myStopKey&&si>=0&&!isAllPast&&idx===filteredStops.findIndex(function(s2){var t2=getTimes(s2.k); return findNext(t2)>=0;});

    var cls='stop-row';
    if(isMyStop) cls+=' stop-row--mystop';
    else if(isNextStop&&!ST.myStopKey) cls+=' stop-row--next-stop';
    if(isAllPast) cls+=' stop-row--past';
    if(stop.ep) cls+=' stop-row--endpoint';

    hTimeline+='<div class="'+cls+'" style="animation-delay:'+(idx*0.025)+'s">';
    hTimeline+='<div class="stop-row__dot"><div class="stop-row__dot-inner"></div></div>';
    hTimeline+='<div class="stop-row__body">';
    hTimeline+='<div class="stop-row__top">';
    hTimeline+='<div class="stop-row__name">'+stop.n+'</div>';
    hTimeline+='<div class="stop-row__actions">';
    if(st&&!isAllPast){
      hTimeline+='<div class="stop-row__next-badge">';
      hTimeline+='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      hTimeline+=st+'</div>';
    }
    // My stop pin button
    hTimeline+='<button class="stop-row__mystop-btn'+(isMyStop?' stop-row__mystop-btn--active':'')+'" onclick="event.stopPropagation();setMyStop(\''+stop.k.replace(/'/g,"\\'")+'\')" title="'+(isMyStop?'Зняти як мою зупинку':'Встановити як мою зупинку')+'" aria-pressed="'+isMyStop+'">';
    hTimeline+='<svg width="13" height="13" viewBox="0 0 24 24" fill="'+(isMyStop?'#ff9500':'none')+'" stroke="'+(isMyStop?'#ff9500':'currentColor')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    hTimeline+='</button>';
    hTimeline+='</div></div>';

    if(times.length>0){
      hTimeline+='<div class="times-grid">';
      var now = nowMin();
      times.forEach(function(t){
        var tm=parseT(t);
        var c='time-chip';
        if(t===st) c+=' time-chip--next';
        else if(tm<now) c+=' time-chip--past';
        hTimeline+='<span class="'+c+'">'+t+'</span>';
      });
      hTimeline+='</div>';
    } else {
      hTimeline+='<span style="font-size:11px;color:var(--text-tertiary)">Дані відсутні</span>';
    }
    hTimeline+='</div>';
    hTimeline+='</div>';
  });
  hTimeline+='</div>';

  /* CTA */
  hTimeline+='<div style="height:32px"></div>';

  document.getElementById('timelineContent').innerHTML = hTimeline;
}

function setDay(isHoliday){
  if(ST.isHoliday === isHoliday) return;
  ST.isHoliday = isHoliday;
  saveState();
  render();
}

updateClock();
setInterval(updateClock, 10000);
setInterval(render, 60000);
render();

if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().catch(function(){});
}

// ─── ANALYTICS PING ───
(function(){
  var visitorId = localStorage.getItem('nearbus_visitorId');
  var isNewSession = false;
  if (!visitorId) {
    visitorId = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    localStorage.setItem('nearbus_visitorId', visitorId);
    isNewSession = true;
  }
  
  function sendPing() {
    if (document.visibilityState !== 'visible') return;
    fetch('/api/ping?visitorId=' + visitorId + (isNewSession ? '&isNewSession=true' : ''))
      .then(function() { isNewSession = false; })
      .catch(function(){});
  }

  sendPing();
  setInterval(sendPing, 30000);
  document.addEventListener('visibilitychange', function() {
    if(document.visibilityState === 'visible') sendPing();
  });
})();
</script>
</body>
</html>
