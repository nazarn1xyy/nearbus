<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Nearbus — відстеження автобусів Могилева-Подільського в реальному часі" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Nearbus</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="glass.css?v=2" />
  <link rel="stylesheet" href="style.css?v=34" />
</head>
<body>

  <div id="map"></div>

  <!-- Weather Widget -->
  <div id="weatherWidget" class="weather-widget" aria-label="Погода" hidden>
    <div class="weather-widget__icon" id="weatherIcon"><i data-lucide="cloud"></i></div>
    <div class="weather-widget__temp" id="weatherTemp">--°</div>
  </div>

  <!-- Air Raid Alert Pill (on the map) -->
  <div id="alertPill" class="alert-pill" hidden>
    <div class="alert-pill__pulse"></div>
    <i data-lucide="triangle-alert" class="alert-pill__icon"></i>
    <span class="alert-pill__text">Повітряна тривога</span>
  </div>


  <!-- Apple Maps-style controls (right side) -->
  <div class="map-controls-right">
    <!-- Group 1: Compass + 3D -->
    <div class="map-btn-group">
      <button id="btnCompass" type="button" class="map-btn" aria-label="Компас">
        <i data-lucide="compass" style="color: #ff3b30"></i>
      </button>
      <button id="menuBtn3D" type="button" class="map-btn" aria-label="3D режим">
        <span style="font-size:14px; font-weight:800; letter-spacing:-0.5px; color: var(--text);">3D</span>
      </button>
    </div>

    <!-- Group 2: Globe + Location -->
    <div class="map-btn-group">
      <button id="menuBtnGlobe" type="button" class="map-btn" aria-label="Супутник">
        <i data-lucide="globe"></i>
      </button>
      <button id="fabLocate" type="button" class="map-btn" aria-label="Моя локація">
        <i data-lucide="navigation"></i>
      </button>
    </div>
  </div>

  <!-- iOS safe area fill: always covers the home indicator area -->
  <div id="safeAreaFill"></div>

  <div id="sheet" class="sheet sheet--collapsed" aria-modal="false" role="region" aria-label="Найближчі автобуси">
    <div class="sheet__handle" aria-hidden="true"></div>
    
    <div class="search-container">
      <div class="search-input-wrapper">
        <i data-lucide="search" class="search-icon search-icon--lens"></i>
        <input type="search" id="stopSearch" class="search-input" placeholder="Шукати зупинку..." aria-label="Пошук зупинки" autocomplete="off">
        <button id="searchClearBtn" class="search-clear-btn" aria-label="Очистити пошук" hidden>
          <i data-lucide="x"></i>
        </button>
      </div>
      <!-- Recent Searches (Task 71) -->
      <div id="recentSearches" class="recent-searches" hidden></div>
      <button id="menuBtn" class="menu-btn" aria-label="Меню">
        <i data-lucide="menu"></i>
      </button>
      
      <!-- Menu Popup (only About & Feedback remain) -->
      <div id="menuPopup" class="menu-popup" hidden>
        <button class="menu-item" id="menuBtnAbout" type="button">
          <i data-lucide="info"></i>
          <span>Про додаток</span>
        </button>
        <button class="menu-item" id="menuBtnFeedback" type="button">
          <i data-lucide="message-square"></i>
          <span>Зворотній зв'язок</span>
        </button>
        <button class="menu-item" type="button" onclick="window.location.href='schedule.html'">
          <i data-lucide="calendar-days"></i>
          <span>Розклад автобусів</span>
        </button>
      </div>
    </div>

    <div id="sheetContent" class="sheet__content">

      <!-- Air Raid Alert Card (inside sheet) -->
      <div id="alertCard" class="alert-card" hidden>
        <div class="alert-card__header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <strong>Повітряна тривога</strong>
        </div>
        <p class="alert-card__body">Вінницька область — автобуси можуть бути затримані. Залишайтеся в укритті.</p>
        <div class="alert-card__time" id="alertTime"></div>
      </div>


      <div class="places-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
          <h3 class="places-title" style="margin-bottom: 0;">Маршрути <i data-lucide="chevron-right"></i></h3>
          <button id="btnLastAlert" class="map-btn" style="width:auto; padding: 0 12px; font-size:12px; font-weight:600; border-radius:14px; height:28px;" aria-label="Остання тривога">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Тривоги
          </button>
        </div>
        <div id="routeFilter" class="places-list" role="group" aria-label="Фільтр маршрутів">
          <!-- Chips will be rendered here via JS -->
        </div>
      </div>

      <div id="busCardsContainer">
        <div class="sheet__placeholder">
          <div class="sheet__placeholder-icon">
            <i data-lucide="map-pin-off"></i>
          </div>
          <p>Натисніть «Дозволити геолокацію»<br>щоб знайти найближчий автобус</p>
        </div>
      </div>
    </div>
  </div>



  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="routes.js?v=10"></script>
  <script src="app.js?v=20"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
